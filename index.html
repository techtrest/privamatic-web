  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

1, h2, h3 { line-height: 1.1; margin: 0; letter-spacing: -0.02em; text-wrap: balance; }\n  p { margin: 0; text-wrap: pretty; }\n  a { color: inherit; }\n\n  .wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 24px; width: 100%; }\n\n  /* ---------- Wordmark ---------- */\n  .mark { font-weight: 400; letter-spacing: -0.01em; }\n  .mark b { font-weight: 800; }\n\n  /* ---------- Header ---------- */\n  header.site {\n    position: sticky; top: 0; z-index: 50;\n    background: var(--green);\n    color: var(--cream);\n  }\n  header.site .wrap {\n    display: flex; align-items: center; justify-content: space-between;\n    height: 64px;\n  }\n  header.site .logo { font-size: 22px; color: var(--cream); text-decoration: none; }\n  header.site nav { display: flex; gap: 28px; align-items: center; }\n  header.site nav a {\n    color: var(--cream-soft); text-decoration: none; font-size: 15px;\n    transition: color .15s ease;\n  }\n  header.site nav a:hover { color: var(--cream); }\n  header.site nav a.ghost {\n    border: 1px solid rgba(255,253,208,.4); border-radius: 999px;\n    padding: 7px 16px; color: var(--cream);\n  }\n  header.site nav a.ghost:hover { background: rgba(255,253,208,.12); }\n  @media (max-width: 620px) {\n    header.site nav .hide-sm { display: none; }\n  }\n  @media (max-width: 768px) {\n    header.site .logo { display: none; }\n  }\n\n  /* ---------- Buttons ---------- */\n  .btn {\n    display: inline-flex; align-items: center; gap: 10px;\n    font-size: 16px; font-weight: 600; text-decoration: none;\n    padding: 14px 26px; border-radius: 10px;\n    transition: transform .12s ease, background .15s ease, box-shadow .15s ease;\n    cursor: pointer;\n  }\n  .btn:active { transform: translateY(1px); }\n  .btn-cream { background: var(--cream); color: var(--green); }\n  .btn-cream:hover { box-shadow: 0 6px 24px rgba(0,0,0,.22); }\n  .btn-outline-cream { background: transparent; color: var(--cream); border: 1.5px solid var(--cream); }\n  .btn-outline-cream:hover { background: rgba(255,253,208,.12); }\n  .btn-green { background: var(--green); color: var(--cream); }\n  .btn-green:hover { background: var(--green-deep); box-shadow: 0 6px 24px rgba(0,66,37,.28); }\n\n  /* ---------- Hero ---------- */\n  .hero { background: var(--green); color: var(--cream); overflow: hidden; }\n  .hero .wrap {\n    display: grid; grid-template-columns: 1.05fr .95fr; gap: 56px;\n    align-items: center; padding-top: 80px; padding-bottom: 80px;\n  }\n  .hero h1 { font-size: clamp(40px, 6vw, 68px); color: var(--cream); }\n  .hero .tagline { font-size: clamp(20px, 2.4vw, 27px); color: var(--cream); margin-top: 26px; font-weight: 500; max-width: 18ch; line-height: 1.25; }\n  .hero .subline { font-size: 17px; color: var(--cream-soft); margin-top: 20px; max-width: 42ch; }\n  .hero .ctas { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 36px; }\n\n  /* ---------- Phone mockup ---------- */\n  .phone {\n    --w: 280px;\n    width: var(--w);\n    aspect-ratio: 1080 / 2424;\n    background: #0a0a0a;\n    border-radius: 38px;\n    padding: 10px;\n    box-shadow: 0 30px 70px -20px rgba(0,0,0,.55), 0 0 0 1px rgba(0,0,0,.4);\n    margin: 0 auto;\n  }\n  .phone .screen {\n    width: 100%; height: 100%;\n    border-radius: 29px;\n    overflow: hidden;\n    background: var(--green);\n    position: relative;\n  }\n  .phone img { width: 100%; height: 100%; object-fit: cover; display: block; }\n  .hero .phone-col { display: flex; justify-content: center; }\n\n  @media (max-width: 860px) {\n    .hero .wrap { grid-template-columns: 1fr; gap: 48px; text-align: center; padding-top: 60px; padding-bottom: 64px; }\n    .hero .tagline, .hero .subline { max-width: none; margin-left: auto; margin-right: auto; }\n    .hero .ctas { justify-content: center; }\n  }\n\n  /* ---------- Section scaffolding ---------- */\n  section.block { padding: 96px 0; }\n  section.light { background: var(--bg); }\n  section.surface { background: var(--surface); }\n  section.dark { background: var(--green); color: var(--cream); }\n\n  .eyebrow {\n    font-size: 13px; letter-spacing: .14em; text-transform: uppercase;\n    font-weight: 700; color: var(--ink-soft); margin-bottom: 18px;\n  }\n  .dark .eyebrow { color: var(--cream-soft); }\n  .section-head h2 { font-size: clamp(16px, 5vw, 44px); white-space: nowrap; }\n  .section-head { max-width: max-content; margin-bottom: 56px; }\n\n  /* ---------- What it does ---------- */\n  .three { display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; }\n  .stmt {\n    background: var(--surface); border: 1px solid var(--line);\n    border-radius: 16px; padding: 32px 30px;\n  }\n  .stmt .ic {\n    width: 48px; height: 48px; border-radius: 12px;\n    background: var(--green); color: var(--cream);\n    display: flex; align-items: center; justify-content: center;\n    margin-bottom: 22px;\n  }\n  .stmt .ic svg { width: 26px; height: 26px; }\n  .stmt p { font-size: 18px; color: var(--ink); line-height: 1.45; }\n  .stmt p b { color: var(--green); font-weight: 700; }\n\n  .center-phone { display: flex; justify-content: center; margin-top: 72px; }\n  .center-phone .phone { --w: 300px; }\n\n  @media (max-width: 760px) {\n    .three { grid-template-columns: 1fr; gap: 18px; }\n  }\n\n  /* ---------- Score showcase ---------- */\n  .score-wrap {\n    display: grid; grid-template-columns: auto 1fr; gap: 64px; align-items: center;\n  }\n  .ring-box { display: flex; justify-content: center; }\n  .ring { position: relative; width: 300px; height: 300px; }\n  .ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }\n  .ring .track { fill: none; stroke: rgba(255,253,208,.18); stroke-width: 14; }\n  .ring .prog {\n    fill: none; stroke: var(--cream); stroke-width: 14; stroke-linecap: round;\n    stroke-dasharray: 817; /* 2*pi*130 */\n    stroke-dashoffset: 817;\n    transition: none;\n  }\n  .ring.draw .prog {\n    animation: drawRing 1.8s cubic-bezier(.22,.61,.36,1) forwards;\n  }\n  @keyframes drawRing {\n    to { stroke-dashoffset: 60.5; } /* 93% of 817 ≈ 760 drawn */\n  }\n  .ring .num {\n    position: absolute; inset: 0; display: flex; flex-direction: column;\n    align-items: center; justify-content: center;\n  }\n  .ring .num .big { font-size: 88px; font-weight: 800; color: var(--cream); line-height: 1; letter-spacing: -0.03em; }\n  .ring .num .lab { font-size: 14px; letter-spacing: .14em; text-transform: uppercase; color: var(--cream-soft); margin-top: 8px; }\n  .score-copy h2 { font-size: clamp(28px, 3.6vw, 40px); color: var(--cream); }\n  .score-copy p { font-size: 19px; color: var(--cream-soft); margin-top: 20px; max-width: 34ch; }\n  .score-copy .rating { display: block; margin-top: 16px; font-size: 14px; font-weight: 500; color: var(--cream-soft); }\n\n  @media (max-width: 760px) {\n    .score-wrap { grid-template-columns: 1fr; gap: 44px; text-align: center; }\n    .score-copy p { margin-left: auto; margin-right: auto; }\n    .ring { width: 250px; height: 250px; }\n  }\n\n  /* ---------- Install steps ---------- */\n  .steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; counter-reset: step; }\n  .step {\n    background: var(--bg); border: 1px solid var(--line); border-radius: 16px;\n    padding: 32px 30px; position: relative;\n  }\n  .step .n {\n    counter-increment: step;\n    font-size: 15px; font-weight: 700; color: var(--green);\n    border: 1.5px solid var(--green); border-radius: 999px;\n    width: 38px; height: 38px; display: flex; align-items: center; justify-content: center;\n    margin-bottom: 20px;\n  }\n  .step .n::before { content: counter(step); }\n  .step p { font-size: 18px; color: var(--ink); }\n  .step p b { color: var(--green); font-weight: 700; }\n  .step p a { white-space: nowrap; }\n  .install-footer { margin-top: 44px; display: flex; flex-direction: column; gap: 18px; align-items: flex-start; }\n  .install-footer .note { font-size: 14px; color: var(--ink-soft); }\n  @media (max-width: 760px) {\n    .steps { grid-template-columns: 1fr; gap: 16px; }\n    .step { padding: 20px 18px; }\n  }\n\n  /* ---------- Trust signals ---------- */\n  .trust { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--line); border: 1px solid var(--line); border-radius: 16px; overflow: hidden; }\n  .trust .cell { background: var(--surface); padding: 30px 26px; }\n  .trust .cell .ic { color: var(--green); margin-bottom: 16px; }\n  .trust .cell .ic svg { width: 24px; height: 24px; display: block; }\n  .trust .cell h3 { font-size: 16px; color: var(--green); font-weight: 700; }\n  .trust .cell p { font-size: 14px; color: var(--ink-soft); margin-top: 8px; line-height: 1.5; }\n  @media (max-width: 820px) { .trust { grid-template-columns: repeat(2, 1fr); } }\n\n  /* ---------- Footer ---------- */\n  footer.site { background: var(--green-deep); color: var(--cream); padding: 56px 0; }\n  footer.site .row { display: flex; justify-content: space-between; align-items: flex-start; gap: 32px; flex-wrap: wrap; }\n  footer.site .name { font-size: 22px; color: var(--cream); }\n  footer.site .name + p { font-size: 15px; color: var(--cream-soft); margin-top: 8px; }\n  footer.site .links { display: flex; gap: 28px; }\n  footer.site .links a { color: var(--cream); text-decoration: none; font-size: 15px; font-weight: 600; border-bottom: 1px solid rgba(255,253,208,.35); padding-bottom: 2px; }\n  footer.site .links a:hover { border-color: var(--cream); }\n  footer.site .baseline { margin-top: 44px; padding-top: 24px; border-top: 1px solid rgba(255,253,208,.16); font-size: 14px; color: var(--cream-soft); }\n\n  /* ---------- Scroll reveal ---------- */\n  .reveal { opacity: 0; transform: translateY(24px); transition: opacity .7s ease, transform .7s ease; }\n  .reveal.in { opacity: 1; transform: none; }\n  @media (prefers-reduced-motion: reduce) {\n    .reveal { opacity: 1; transform: none; transition: none; }\n    .ring .prog { stroke-dashoffset: 60.5; animation: none; }\n    html >\n      <div class=\"three\">\n        <div class=\"stmt reveal\">\n          <div class=\"ic\" aria-hidden=\"true\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 7V5a2 2 0 0 1 2-2h2\"><\u002Fpath><path d=\"M17 3h2a2 2 0 0 1 2 2v2\"><\u002Fpath><path d=\"M21 17v2a2 2 0 0 1-2 2h-2\"><\u002Fpath><path d=\"M7 21H5a2 2 0 0 1-2-2v-2\"><\u002Fpath><path d=\"M3 12h18\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <p>Scans <b>45+ settings<\u002Fb> across security, tracking, and surveillance app detection.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"stmt reveal\">\n          <div class=\"ic\" aria-hidden=\"true\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 7v5l3 2\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <p>Scores your device from <b>0 to 100<\u002Fb>. Tells you exactly what to fix.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"stmt reveal\">\n          <div class=\"ic\" aria-hidden=\"true\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 21V4\"><\u002Fpath><path d=\"M4 4h13l-2.5 4L17 12H4\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <p>Flags when <b>Google, Meta, Microsoft, and AI apps<\u002Fb> are installed and active.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"center-phone reveal\">\n        <div class=\"phone\">\n          <div class=\"screen\">\n            <img src=\"4d766553-21a8-4573-8cbc-64bd32b2527c\" alt=\"PRIVAmatic Details screen listing check categories: System Security 2 of 10, Network and Tracking Privacy, Google Services, Default Apps, Google Apps, Meta/Facebook, Microsoft, and AI and Other Apps, each with a pass count.\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 3. SCORE SHOWCASE -->\n  <section class=\"block dark\">\n    <div class=\"wrap\">\n      <div class=\"score-wrap\">\n        <div class=\"ring-box reveal\">\n          <div class=\"ring\" id=\"ring\">\n            <svg viewBox=\"0 0 300 300\" aria-hidden=\"true\">\n              <circle class=\"track\" cx=\"150\" cy=\"150\" r=\"130\"><\u002Fcircle>\n              <circle class=\"prog\" cx=\"150\" cy=\"150\" r=\"130\"><\u002Fcircle>\n            <\u002Fsvg>\n            <div class=\"num\">\n              <span class=\"big\" id=\"scoreNum\">0<\u002Fspan>\n              <span class=\"lab\">out of 100<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"score-copy reveal\">\n          <p class=\"eyebrow\">Privacy score<\u002Fp>\n          <h2>Your score updates every time you scan.<\u002Fh2>\n          <p>Every point has a reason. Open any check to see what raised it or what is holding it back.<\u002Fp>\n          <span class=\"rating\">Excellent — Strong protection<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 4. HOW TO INSTALL -->\n  <section class=\"block light\" id=\"install\">\n    <div class=\"wrap\">\n      <div class=\"section-head reveal\">\n        <p class=\"eyebrow\">How to install<\u002Fp>\n        <h2>Available on F-Droid<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"steps\">\n        <div class=\"step reveal\"><div class=\"n\" aria-hidden=\"true\"><\u002Fdiv><p>Get the <b>F-Droid app<\u002Fb> at <a href=\"https://f-droid.org\" target=\"_blank\" rel=\"noopener noreferrer\">f-droid.org<\u002Fa><\u002Fp><\u002Fdiv>\n        <div class=\"step reveal\"><div class=\"n\" aria-hidden=\"true\"><\u002Fdiv><p>Search for <b>Privamatic<\u002Fb><\u002Fp><\u002Fdiv>\n        <div class=\"step reveal\"><div class=\"n\" aria-hidden=\"true\"><\u002Fdiv><p>Install and <b>scan your device<\u002Fb><\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"install-footer reveal\">\n        <a class=\"btn btn-green\" href=\"https://f-droid.org/packages/com.techtrest.privamatic\" target=\"_blank\" rel=\"noopener noreferrer\">Open in F-Droid<\u002Fa>\n        <p class=\"note\">No Google Play. Intentionally.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 5. TRUST SIGNALS -->\n  <section class=\"block surface\">\n    <div class=\"wrap\">\n      <div class=\"trust reveal\">\n        <div class=\"cell\">\n          <div class=\"ic\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M3 12h18\"><\u002Fpath><path d=\"M12 3a14 14 0 0 1 0 18 14 14 0 0 1 0-18\"><\u002Fpath><line x1=\"4\" y1=\"4\" x2=\"20\" y2=\"20\"><\u002Fline><\u002Fsvg><\u002Fdiv>\n          <h3>No internet permission<\u002Fh3>\n          <p>The app cannot connect to the internet by design.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"cell\">\n          <div class=\"ic\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"8 6 2 12 8 18\"><\u002Fpolyline><polyline points=\"16 6 22 12 16 18\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv>\n          <h3>Open source<\u002Fh3>\n          <p>Every check is visible in the source code.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"cell\">\n          <div class=\"ic\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3l7 3v5c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9V6z\"><\u002Fpath><polyline points=\"9 12 11 14 15 10\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv>\n          <h3>Verified by F-Droid<\u002Fh3>\n          <p>Built and distributed by F-Droid's infrastructure.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"cell\">\n          <div class=\"ic\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"4\" y=\"10\" width=\"16\" height=\"11\" rx=\"2\"><\u002Frect><path d=\"M8 10V7a4 4 0 0 1 8 0v3\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <h3>Offline only<\u002Fh3>\n          <p>Nothing leaves your device.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fmain>\n\n<!-- 6. FOOTER -->\n<footer class=\"site\">\n  <div class=\"wrap\">\n    <div class=\"row\">\n      <div>\n        <div class=\"name mark\"><b>PRIVA<\u002Fb>matic<\u002Fdiv>\n        <p>Free and open source Android app.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"links\">\n        <a href=\"https://github.com/techtrest/privamatic\">GitHub<\u002Fa>\n        <a href=\"https://f-droid.org/packages/com.techtrest.privamatic\">F-Droid<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"baseline\">No cookies. No tracking. No nonsense.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<script>\n  // Scroll reveal — minimal, no dependencies.\n  (function () {\n    var revealEls = document.querySelectorAll('.reveal');\n    if (!('IntersectionObserver' in window)) {\n      revealEls.forEach(function (el) { el.classList.add('in'); });\n      drawScore();\n      return;\n    }\n    var io = new IntersectionObserver(function (entries) {\n      entries.forEach(function (e) {\n        if (e.isIntersecting) {\n          e.target.classList.add('in');\n          io.unobserve(e.target);\n        }\n      });\n    }, { threshold: 0.15, rootMargin: '0px 0px -8% 0px' });\n    revealEls.forEach(function (el) { io.observe(el); });\n\n    // Score circle: draw + count up when it enters view.\n    var ring = document.getElementById('ring');\n    var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n    function drawScore() {\n      var num = document.getElementById('scoreNum');\n      if (!num) return;\n      if (reduce) { num.textContent = '93'; return; }\n      var target = 93, start = null, dur = 1700;\n      function tick(t) {\n        if (start === null) start = t;\n        var p = Math.min((t - start) / dur, 1);\n        var eased = 1 - Math.pow(1 - p, 3);\n        num.textContent = Math.round(eased * target);\n        if (p < 1) requestAnimationFrame(tick);\n        else num.textContent = '93';\n      }\n      requestAnimationFrame(tick);\n    }\n    window.__drawScore = drawScore;\n    if (ring) {\n      var ringIo = new IntersectionObserver(function (entries) {\n        entries.forEach(function (e) {\n          if (e.isIntersecting) {\n            ring.classList.add('draw');\n            drawScore();\n            ringIo.unobserve(ring);\n          }\n        });\n      }, { threshold: 0.4 });\n      ringIo.observe(ring);\n    }\n  })();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
